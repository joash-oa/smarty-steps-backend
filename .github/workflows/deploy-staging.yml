name: Deploy — Staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ghcr.io/${{ github.repository }}:staging .
          docker push ghcr.io/${{ github.repository }}:staging

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to staging EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_STAGING_INSTANCE_ID }}
        run: |
          COMPOSE_B64=$(base64 -w 0 docker-compose.prod.yml)

          PARAMS=$(jq -n --arg compose "$COMPOSE_B64" \
            '{"commands": [
              "TOKEN=$(aws ssm get-parameter --name /smarty-steps/ghcr-pat --with-decryption --query Parameter.Value --output text)",
              "echo \"$TOKEN\" | docker login ghcr.io -u joash-oa --password-stdin",
              "mkdir -p /opt/smarty-steps",
              ("echo " + $compose + " | base64 -d > /opt/smarty-steps/docker-compose.prod.yml"),
              "IMAGE_TAG=staging docker compose -f /opt/smarty-steps/docker-compose.prod.yml pull",
              "IMAGE_TAG=staging docker compose -f /opt/smarty-steps/docker-compose.prod.yml up -d"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text)

          [ -n "$STDOUT" ] && echo "STDOUT: $STDOUT"
          [ -n "$STDERR" ] && echo "STDERR: $STDERR"
          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
