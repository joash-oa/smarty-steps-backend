name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: staging)"
        required: false
        default: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to prod EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_PROD_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          PARAMS=$(jq -n --arg tag "$IMAGE_TAG" \
            '{"commands": [
              "TOKEN=$(aws ssm get-parameter --name /smarty-steps/ghcr-pat --with-decryption --query Parameter.Value --output text)",
              "echo \"$TOKEN\" | docker login ghcr.io -u joash-oa --password-stdin",
              "cd /opt/smarty-steps",
              ("IMAGE_TAG=" + $tag + " docker compose -f docker-compose.prod.yml pull"),
              ("IMAGE_TAG=" + $tag + " docker compose -f docker-compose.prod.yml up -d")
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text)

          [ -n "$STDERR" ] && echo "STDERR: $STDERR"
          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
